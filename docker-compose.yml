services:
  express-api:
    build: .
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      # if server is running on Docker
      - OLLAMA_HOST=http://host.docker.internal:11434
      # if it's running on host machine
      # - OLLAMA_HOST=http://localhost:11434
      # if it's running on docker and we want to use it as a service
      # - OLLAMA_HOST=http://ollama-service:11434
      - MODEL_NAME=gemma4
    env_file:
      - .env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http --url=yearningly-stemlike-shavon.ngrok-free.dev express-api:9000
    # environment:
    #   - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    env_file:
      - .env
    depends_on:
      - express-api
    restart: unless-stopped

  # uptime-kuma:
  #   image: louislam/uptime-kuma:latest
  #   container_name: uptime-kuma
  #   ports:
  #     - "15555:15555"
  #   volumes:
  #     - ./uptime-kuma-data:/app/data
  #   restart: unless-stopped

  netdata:
    image: netdata/netdata
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped
