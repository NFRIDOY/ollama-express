services:
  express-api:
    build: .
    ports:
      - "9000:9000"
    environment:
      - PORT=9000
      # if server is running on Docker
      - OLLAMA_HOST=http://host.docker.internal:11434
      # if it's running on host machine
      # - OLLAMA_HOST=http://localhost:11434
      # if it's running on docker and we want to use it as a service
      # - OLLAMA_HOST=http://ollama-service:11434
      - MODEL_NAME=gemma4
    env_file:
      - .env
    restart: unless-stopped
